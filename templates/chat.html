{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe – Chat</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    .chat-layout {
      display: flex;
      height: calc(100vh - 64px);
      margin-top: 20px;
      gap: 20px;
    }
    .conversations-sidebar {
      width: 300px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .conversations-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .conversations-list {
      flex: 1;
      overflow-y: auto;
    }
    .conversation-item {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--border);
    }
    .conversation-item:hover, .conversation-item.active {
      background: rgba(255, 255, 255, 0.05);
    }
    .conversation-item.active {
      border-left: 3px solid var(--accent);
    }
    .conversation-item .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .conversation-info {
      flex: 1;
      overflow: hidden;
    }
    .conversation-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .last-message {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-window {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .messages-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message-item {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .message-item.sent {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message-item.received {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message-info {
      font-size: 0.7rem;
      margin-top: 4px;
      opacity: 0.7;
    }

    .chat-input-area {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font);
      outline: none;
    }
    .chat-input-area input:focus {
      border-color: var(--accent);
    }

    /* New Chat Modal */
    #new-chat-modal .modal {
        max-width: 400px;
    }
    .user-select-list {
        max-height: 300px;
        overflow-y: auto;
        margin-top: 12px;
    }
    .user-select-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        cursor: pointer;
        border-radius: var(--radius-sm);
    }
    .user-select-item:hover {
        background: rgba(255, 255, 255, 0.05);
    }
    .user-select-item input {
        width: auto;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">✦ Vibe</div>
      <ul class="sidebar-nav">
        <li><a href="/feed/"><span class="icon">🏠</span> Home Feed</a></li>
        <li><a href="/follows/"><span class="icon">👥</span> People</a></li>
        <li><a href="/chat/" class="active"><span class="icon">💬</span> Chat</a></li>
        <li><a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a></li>
      </ul>
      <div class="sidebar-user" id="current-user">
        <div class="avatar" id="user-avatar-initial"></div>
        <div class="user-info">
          <div class="user-name" id="user-name">Loading...</div>
          <div class="user-role" id="user-role"></div>
          <div class="user-stats">
            <a href="/follows/?tab=followers" class="stat"><strong id="user-followers">0</strong> Followers</a>
            <a href="/follows/?tab=following" class="stat"><strong id="user-following">0</strong> Following</a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" style="max-width: none;">
      <div class="chat-layout">
        <!-- Conversations Sidebar -->
        <div class="conversations-sidebar">
          <div class="conversations-header">
            <h3>Chat</h3>
            <button class="btn btn-primary btn-sm" style="width:auto; padding:6px 10px;" onclick="openNewChatModal()" title="New Group Chat">+</button>
          </div>
          <div class="sidebar-sections" style="overflow-y: auto; flex: 1;">
              <div class="sidebar-section-title" style="padding: 12px 20px 4px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Active Chats</div>
              <div id="conversations-list" class="conversations-list">
                <!-- Conversations will be injected here -->
              </div>

              <div class="sidebar-section-title" style="padding: 20px 20px 4px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Available to Chat</div>
              <div id="contacts-list" class="conversations-list">
                <!-- Contacts will be injected here -->
              </div>
          </div>
        </div>

        <!-- Chat Window -->
        <div class="chat-window" id="chat-window" style="display:none;">
          <div class="chat-header">
            <div class="avatar" id="active-chat-avatar"></div>
            <div class="conversation-info">
              <div class="conversation-name" id="active-chat-name">Select a conversation</div>
            </div>
          </div>
          <div id="messages-container" class="messages-container">
            <!-- Messages will be injected here -->
          </div>
          <form class="chat-input-area" onsubmit="handleSendMessage(event)">
            <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
            <button type="submit" class="btn btn-primary" style="width:auto;">Send</button>
          </form>
        </div>

        <div class="chat-window" id="no-chat-selected" style="display:flex; align-items:center; justify-content:center; color:var(--text-muted);">
            <div style="text-align:center;">
                <div style="font-size:3rem; margin-bottom:12px;">💬</div>
                <p>Select a conversation to start chatting</p>
            </div>
        </div>
      </div>
    </main>
  </div>

  <!-- New Chat Modal -->
  <div class="modal-overlay" id="new-chat-modal">
    <div class="modal">
      <h2>New Chat</h2>
      <div class="form-group">
          <label>Conversation Name (Optional for groups)</label>
          <input type="text" id="new-chat-name" placeholder="Group name">
      </div>
      <div class="form-group">
          <label>Select People</label>
          <div id="user-selection-list" class="user-select-list">
              <!-- Users will be injected here -->
          </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeNewChatModal()">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="handleCreateChat()">Start Chat</button>
      </div>
    </div>
  </div>

  <script src="{% static 'js/app.js' %}"></script>
  <script src="{% static 'js/chat.js' %}"></script>
</body>
</html>
