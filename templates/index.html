{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vibe – A premium social media platform. Share moments, connect with friends.">
  <title>Vibe – Social Media</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="logo">✦ Vibe</div>
        <p>Share moments. Connect with friends.</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Sign Up</button>
        </div>

        <div id="alert-box"></div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter your username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" placeholder="Choose a username" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Min 8 characters" required minlength="8">
          </div>
          <div class="form-group">
            <label for="reg-password2">Confirm Password</label>
            <input type="password" id="reg-password2" placeholder="Repeat password" required minlength="8">
          </div>
          <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API = '';

    // If already logged in, redirect to feed
    if (localStorage.getItem('access_token')) {
      window.location.href = '/feed/';
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('alert-box').innerHTML = '';
    }

    function showAlert(msg, type = 'error') {
      document.getElementById('alert-box').innerHTML =
        `<div class="alert alert-${type}">${msg}</div>`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/api/auth/login/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value,
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Invalid credentials');
        }
        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);
        window.location.href = '/feed/';
      } catch (err) {
        showAlert(err.message);
      } finally {
        btn.innerHTML = 'Sign In';
        btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;

      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;

      if (password !== password2) {
        showAlert('Passwords do not match');
        btn.innerHTML = 'Create Account';
        btn.disabled = false;
        return;
      }

      try {
        const res = await fetch(`${API}/api/auth/register/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            password: password,
            password2: password2,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          const firstErr = Object.values(data)[0];
          throw new Error(Array.isArray(firstErr) ? firstErr[0] : firstErr);
        }
        localStorage.setItem('access_token', data.tokens.access);
        localStorage.setItem('refresh_token', data.tokens.refresh);
        window.location.href = '/feed/';
      } catch (err) {
        showAlert(err.message);
      } finally {
        btn.innerHTML = 'Create Account';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
